<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>修改每日任务</title>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad961);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 500px;
            padding: 32px;
            background: rgba(142, 32, 148, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .card h2 { text-align: center; margin-bottom: 24px; }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            font-size: 14px;
            opacity:0.85;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(142, 32, 148, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .form-group input::placeholder { color: rgba(255,255,255,0.5); }

        .btn-row { display: flex; gap: 12px; margin-top: 20px; }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            text-decoration: none;
        }

        .btn-primary { background: rgba(255,255,255,0.25); color: #fff; border: none; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="card">
        <h2>✏️ 修改每日任务</h2>

        <form method="POST">
            <div class="form-group">
                <label>任务标题</label>
                <input type="text" name="title" value="{{ task.Title }}" required>
            </div>

            <div class="form-group">
                <label>备注</label>
                <input type="text" name="info" value="{{ task.Info }}">
            </div>

            <div class="btn-row">
                <button type="submit" class="btn btn-primary">保存修改</button>
                <a href="/?page=today" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</body>
</html>
